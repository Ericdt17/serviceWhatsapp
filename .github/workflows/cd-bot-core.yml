name: CD Bot Core

on:
  push:
    branches:
      - main
    paths:
      - 'wwebjs-bot/**'
      - '.github/workflows/cd-bot-core.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy core WhatsApp bot to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy whatsapp-bot-core
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_USERNAME,GH_TOKEN
          script: |
            set -e

            DEPLOY_ROOT="${BOT_CORE_DEPLOY_PATH:-/opt/livsight-whatsapp-core}"

            if [ ! -d "$DEPLOY_ROOT/.git" ]; then
              echo "→ First deploy: clone into $DEPLOY_ROOT"
              sudo mkdir -p "$DEPLOY_ROOT"
              sudo chown -R "$(whoami):$(whoami)" "$DEPLOY_ROOT"
              git clone "https://${GH_USERNAME}:${GH_TOKEN}@github.com/Ericdt17/saasDelivery.git" "$DEPLOY_ROOT"
            fi

            cd "$DEPLOY_ROOT"

            echo "→ Pulling latest code..."
            git remote set-url origin "https://${GH_USERNAME}:${GH_TOKEN}@github.com/Ericdt17/saasDelivery.git"
            git fetch origin main
            git reset --hard origin/main

            echo "→ Installing dependencies..."
            cd wwebjs-bot
            npm install --omit=dev

            echo "→ Skipping migrations (USE_CORE_API + SKIP_MIGRATIONS on bot host)"

            echo "→ Restarting whatsapp-bot-core..."
            pm2 restart whatsapp-bot-core || pm2 start src/index.js --name whatsapp-bot-core
            pm2 save

            echo "→ Verifying..."
            sleep 3
            pm2 list | grep whatsapp-bot-core

            echo "✓ Core bot deploy complete"
