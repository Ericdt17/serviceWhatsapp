name: CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'wwebjs-bot/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'wwebjs-bot/**'
      - '.github/workflows/**'

jobs:
  backend-unit:
    name: Backend - Jest Unit & Integration Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: wwebjs-bot/package-lock.json

      - name: Install dependencies
        working-directory: wwebjs-bot
        run: npm ci

      - name: Run Jest tests with coverage
        working-directory: wwebjs-bot
        run: npm run test:coverage -- --ci

  backend-ci:
    name: Backend - Postgres Integration Smoke
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      API_PORT: 3001
      JWT_SECRET: ci-test-jwt-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saasdelivery_ci
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saasdelivery_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d saasdelivery_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: wwebjs-bot/package-lock.json

      - name: Install dependencies
        working-directory: wwebjs-bot
        run: npm ci

      - name: Run migrations
        working-directory: wwebjs-bot
        run: npm run migrate

      - name: Run real-DB integration tests
        working-directory: wwebjs-bot
        run: npm run test:db:integration

      - name: Verify core tables exist
        working-directory: wwebjs-bot
        run: |
          node -e "const { Client } = require('pg'); (async () => { const client = new Client({ connectionString: process.env.DATABASE_URL }); await client.connect(); const { rows } = await client.query(\"SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('schema_migrations','agencies','groups','deliveries','agency_reminder_contacts','reminders','job_offers','job_questions','job_applications','job_answers')\"); const found = rows.map(r => r.table_name); const required = ['schema_migrations','agencies','groups','deliveries','agency_reminder_contacts','reminders','job_offers','job_questions','job_applications','job_answers']; const missing = required.filter(t => !found.includes(t)); if (missing.length) { throw new Error('Missing tables: ' + missing.join(', ')); } console.log('Core tables present:', found.sort().join(', ')); await client.end(); })().catch((err) => { console.error(err); process.exit(1); });"

      - name: Start API server
        working-directory: wwebjs-bot
        run: node src/api/server.js &

      - name: API health smoke test
        run: |
          for i in {1..20}; do
            if curl -fsS "http://127.0.0.1:3001/api/v1/health" > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 1
          done
          echo "API health endpoint did not become ready in time"
          exit 1

  deploy-bot:
    name: Deploy core WhatsApp bot to VPS
    needs: [backend-unit, backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy whatsapp-bot-core
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BOT_HEALTH_PUBLIC_URL: ${{ secrets.BOT_HEALTH_PUBLIC_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_USERNAME,GH_TOKEN,BOT_HEALTH_PUBLIC_URL
          script: |
            set -e

            DEPLOY_ROOT="${BOT_CORE_DEPLOY_PATH:-/opt/livsight-whatsapp-core}"
            REPO_SLUG="Ericdt17/serviceWhatsapp"

            if [ -n "${GH_TOKEN:-}" ] && [ -n "${GH_USERNAME:-}" ]; then
              REPO_URL="https://${GH_USERNAME}:${GH_TOKEN}@github.com/${REPO_SLUG}.git"
            else
              REPO_URL="https://github.com/${REPO_SLUG}.git"
            fi

            if [ ! -d "$DEPLOY_ROOT/.git" ]; then
              echo "→ First deploy: clone into $DEPLOY_ROOT"
              sudo mkdir -p "$DEPLOY_ROOT"
              sudo chown -R "$(whoami):$(whoami)" "$DEPLOY_ROOT"
              git clone "$REPO_URL" "$DEPLOY_ROOT"
            fi

            cd "$DEPLOY_ROOT"

            echo "→ Pulling latest code..."
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main

            echo "→ Installing dependencies..."
            cd wwebjs-bot
            npm install --omit=dev

            echo "→ Skipping migrations (USE_CORE_API + SKIP_MIGRATIONS on bot host)"

            echo "→ Restarting whatsapp-bot-core..."
            pm2 restart whatsapp-bot-core || pm2 start ecosystem.bot-core.config.js
            pm2 save

            echo "→ Verifying PM2 process..."
            sleep 3
            pm2 list | grep whatsapp-bot-core

            echo "→ Health smoke (local + optional public URL)..."
            export BOT_HEALTH_PUBLIC_URL="${BOT_HEALTH_PUBLIC_URL:-}"
            chmod +x scripts/verify-bot-health.sh
            bash scripts/verify-bot-health.sh

            echo "✓ Core bot deploy complete"
